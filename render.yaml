services:
  - type: web
    name: linkedin-bot
    runtime: docker
    plan: free
    envVars:
      - key: HF_API_KEY
        sync: false
      - key: HF_MODEL
        sync: false
      - key: HF_API_URL
        sync: false
      - key: YOU_API_KEYS
        sync: false
      - key: GOOGLE_SHEETS_CREDENTIALS
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: LINKEDIN_ACCESS_TOKEN
        sync: false
      - key: LINKEDIN_PERSON_ID
        sync: false
