<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    font-family: 'Inter', -apple-system, sans-serif;
    overflow: hidden;
    background: #f8f9fb;
    color: #1a1a2e;
  }

  /* === HEADER === */
  .header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
    padding: 40px 50px 36px;
    position: relative;
    overflow: hidden;
  }
  .header::after {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 200px; height: 200px;
    background: rgba(255,107,53,0.12);
    border-radius: 50%;
  }
  .header-top {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
  }
  .header-badge {
    background: {{accent_color}};
    color: #fff;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 4px;
  }
  .header-subtitle {
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    font-weight: 500;
  }
  .header-title {
    font-size: 46px;
    font-weight: 900;
    color: #fff;
    line-height: 1.1;
    letter-spacing: -1px;
    max-width: 900px;
  }
  .header-title .highlight {
    color: {{accent_color}};
  }

  /* === STATS BAR === */
  .stats-bar {
    display: flex;
    align-items: center;
    gap: 0;
    background: #fff;
    border-bottom: 2px solid #eee;
  }
  .stat-item {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 24px;
    border-right: 2px solid #eee;
  }
  .stat-item:last-child { border-right: none; }
  .stat-number {
    font-size: 32px;
    font-weight: 900;
    color: {{accent_color}};
    line-height: 1;
  }
  .stat-label {
    font-size: 12px;
    font-weight: 600;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    line-height: 1.3;
  }

  /* === CARDS GRID === */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat({{grid_cols}}, 1fr);
    gap: 0;
    padding: 0;
  }

  .card {
    padding: 24px 28px;
    border-right: 2px solid #eee;
    border-bottom: 2px solid #eee;
    background: #fff;
    position: relative;
  }
  .card:nth-child({{grid_cols}}n) { border-right: none; }

  /* Last card spans full width if odd count in 2-col grid */
  .card-full-width {
    grid-column: 1 / -1;
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 10px;
  }

  .card-number {
    flex-shrink: 0;
    width: 32px;
    height: 32px;
    background: {{accent_color}};
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 800;
    color: #fff;
  }

  .card-title {
    font-size: 15px;
    font-weight: 800;
    color: #1a1a2e;
    line-height: 1.3;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    padding-top: 4px;
  }

  .card-body {
    font-size: 13px;
    font-weight: 500;
    color: #555;
    line-height: 1.55;
    margin-top: 6px;
  }
  .card-body strong {
    color: #1a1a2e;
    font-weight: 700;
  }

  /* Alternating tint on some cards */
  .card-tinted {
    background: {{tint_color}};
  }

  /* === FOOTER === */
  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 50px;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  }
  .footer-author {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .footer-avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: {{accent_color}};
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 800;
    color: #fff;
  }
  .footer-name {
    font-size: 15px;
    font-weight: 700;
    color: #fff;
  }
  .footer-title {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    margin-top: 2px;
  }
  .footer-cta {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .footer-save {
    background: {{accent_color}};
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    padding: 8px 20px;
    border-radius: 6px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .footer-follow {
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    font-weight: 600;
  }
</style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div class="header-badge">{{category}}</div>
      <div class="header-subtitle">{{subtitle}}</div>
    </div>
    <div class="header-title">{{title_html}}</div>
  </div>

  <!-- STATS BAR -->
  {{stats_bar_html}}

  <!-- CARDS GRID -->
  <div class="cards-grid">
    {{cards_html}}
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="footer-author">
      <div class="footer-avatar">{{author_initials}}</div>
      <div>
        <div class="footer-name">{{author_name}}</div>
        <div class="footer-title">{{author_title}}</div>
      </div>
    </div>
    <div class="footer-cta">
      <div class="footer-follow">{{branding_text}}</div>
      <div class="footer-save">SAVE & SHARE</div>
    </div>
  </div>

</body>
</html>
